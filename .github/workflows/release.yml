name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: snmp-iface-linux-x86_64
            binary: snmp-iface
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: snmp-iface-windows-x86_64
            binary: snmp-iface.exe
            ext: ".exe"

    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_RETRY: "10"
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
             dist/${{ matrix.artifact }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "snmp-iface ${{ github.ref_name }}"
          body: |
            ## рЯЪА snmp-iface ${{ github.ref_name }}

            SNMP-–њ—А–Њ—Б–Љ–Њ—В—А—Й–Є–Ї —Б–µ—В–µ–≤—Л—Е –Є–љ—В–µ—А—Д–µ–є—Б–Њ–≤ –љ–∞ Rust вАФ –±–µ–Ј —Б–Є—Б—В–µ–Љ–љ—Л—Е –Ј–∞–≤–Є—Б–Є–Љ–Њ—Б—В–µ–є.

            ### рЯУ¶ –£—Б—В–∞–љ–Њ–≤–Ї–∞

            –°–Ї–∞—З–∞–є—В–µ –±–Є–љ–∞—А–љ–Є–Ї –і–ї—П —Б–≤–Њ–µ–є –Ю–° –Є–Ј —Б–њ–Є—Б–Ї–∞ –љ–Є–ґ–µ –Є –Ј–∞–њ—Г—Б—В–Є—В–µ:

            ```bash
            # Linux
            chmod +x snmp-iface-linux-x86_64
            ./snmp-iface-linux-x86_64 192.168.1.1 public 161

            # Windows
            snmp-iface-windows-x86_64.exe 192.168.1.1 public 161
            ```

            ### рЯФІ –°–±–Њ—А–Ї–∞ –Є–Ј –Є—Б—Е–Њ–і–љ–Є–Ї–Њ–≤

            ```bash
            cargo build --release
            ./target/release/snmp-iface <IP> [community] [port]
            ```

            ### рЯУЛ –°–Њ–±–Є—А–∞–µ–Љ—Л–µ OID (ifTable, RFC 1213)

            | OID | –Я–Њ–ї–µ | –Ю–њ–Є—Б–∞–љ–Є–µ |
            |-----|------|----------|
            | `.1.3.6.1.2.1.2.2.1.2` | `ifDescr` | –Ш–Љ—П –Є–љ—В–µ—А—Д–µ–є—Б–∞ |
            | `.1.3.6.1.2.1.2.2.1.5` | `ifSpeed` | –°–Ї–Њ—А–Њ—Б—В—М |
            | `.1.3.6.1.2.1.2.2.1.4` | `ifMtu` | MTU |
            | `.1.3.6.1.2.1.2.2.1.6` | `ifPhysAddress` | MAC-–∞–і—А–µ—Б |
            | `.1.3.6.1.2.1.2.2.1.7` | `ifAdminStatus` | Admin-—Б—В–∞—В—Г—Б |
            | `.1.3.6.1.2.1.2.2.1.8` | `ifOperStatus` | Oper-—Б—В–∞—В—Г—Б |
            | `.1.3.6.1.2.1.2.2.1.10` | `ifInOctets` | –Т—Е. —В—А–∞—Д–Є–Ї |
            | `.1.3.6.1.2.1.2.2.1.16` | `ifOutOctets` | –Ш—Б—Е. —В—А–∞—Д–Є–Ї |
            | `.1.3.6.1.2.1.2.2.1.11` | `ifInUcastPkts` | –Т—Е. –њ–∞–Ї–µ—В—Л |
            | `.1.3.6.1.2.1.2.2.1.17` | `ifOutUcastPkts` | –Ш—Б—Е. –њ–∞–Ї–µ—В—Л |
            | `.1.3.6.1.2.1.2.2.1.14` | `ifInErrors` | –Т—Е. –Њ—И–Є–±–Ї–Є |
            | `.1.3.6.1.2.1.2.2.1.20` | `ifOutErrors` | –Ш—Б—Е. –Њ—И–Є–±–Ї–Є |
          generate_release_notes: false
          files: |
            dist/snmp-iface-linux-x86_64
            dist/snmp-iface-windows-x86_64.exe
          draft: false
          prerelease: false
